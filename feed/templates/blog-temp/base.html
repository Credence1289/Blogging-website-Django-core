{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feed</title>

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    :root {
      --ink:       #0f0e0d;
      --paper:     #f5f2ee;
      --accent:    #c8432a;
      --muted:     #7a746c;
      --border:    #ddd8d0;
      --card-bg:   #ffffff;
      --nav-h:     64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav.site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: var(--ink);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 2rem;
      border-bottom: 3px solid var(--accent);
    }

    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--paper);
      text-decoration: none;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .nav-brand span { color: var(--accent); }

    .nav-search {
      flex: 1;
      max-width: 380px;
      margin: 0 auto;
      position: relative;
    }
    .nav-search input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2px;
      color: #fff;
      padding: 0.45rem 3rem 0.45rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    .nav-search input::placeholder { color: rgba(255,255,255,0.4); }
    .nav-search input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.12); }
    .nav-search button {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 0 1rem;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-search button:hover { background: #a8341f; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .nav-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      padding: 0.4rem 0.85rem;
      border-radius: 2px;
      transition: color 0.2s, background 0.2s;
      letter-spacing: 0.02em;
    }
    .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .nav-links .btn-new {
      background: var(--accent);
      color: #fff !important;
      font-weight: 500;
    }
    .nav-links .btn-new:hover { background: #a8341f; }

    .nav-join a {
      color: var(--paper);
      font-size: 0.85rem;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.4rem 1.1rem;
      border-radius: 2px;
      transition: border-color 0.2s, background 0.2s;
    }
    .nav-join a:hover { border-color: var(--accent); background: rgba(200,67,42,0.12); }

    /* ── LAYOUT ── */
    .page-wrapper {
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── POST CARD ── */
    .post-card {
      border-bottom: 1px solid var(--border);
      padding: 2.2rem 0;
      animation: fadeUp 0.5s ease both;
    }
    .post-card:first-child { padding-top: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-meta-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .post-author {
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-decoration: none;
    }
    .post-author:hover { text-decoration: underline; }
    .meta-sep { color: var(--border); font-size: 0.75rem; }
    .post-date {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .post-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.6rem;
      line-height: 1.25;
      margin-bottom: 0.7rem;
    }
    .post-title a {
      color: var(--ink);
      text-decoration: none;
      transition: color 0.15s;
    }
    .post-title a:hover { color: var(--accent); }

    .post-excerpt {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* ── SINGLE POST (detail) ── */
    .single-post { padding-top: 0.5rem; }
    .single-post .post-title {
      font-size: 2.6rem;
      margin-bottom: 1.2rem;
    }
    .single-post .post-content {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #2a2724;
      margin-top: 2rem;
    }
    .post-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-top: 4px solid var(--accent);
      padding: 2.5rem;
      margin-top: 1rem;
      animation: fadeUp 0.4s ease both;
    }
    .form-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .form-card .subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* crispy / form overrides */
    label { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.3rem; }
    .form-control, textarea, input[type="text"] {
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.6rem 0.9rem;
      transition: border-color 0.2s;
      background: var(--paper);
    }
    .form-control:focus, textarea:focus { border-color: var(--accent); outline: none; box-shadow: none; background: #fff; }
    textarea.form-control { min-height: 220px; resize: vertical; }

    /* ── BUTTONS ── */
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.65rem 1.8rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #a8341f; transform: translateY(-1px); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted) !important;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.65rem 1.4rem;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--ink); color: var(--ink) !important; }

    .btn-danger-outline {
      background: transparent;
      border: 1px solid #c8432a;
      border-radius: 2px;
      color: #c8432a;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-danger-outline:hover { background: #c8432a; color: #fff; }

    /* ── PAGINATION ── */
    .pagination-row { display: flex; gap: 0.4rem; margin-top: 2.5rem; flex-wrap: wrap; }
    .pagination-row a, .pagination-row span {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      color: var(--ink);
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.15s, border-color 0.15s;
    }
    .pagination-row a:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .pagination-row .current { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── DELETE PAGE ── */
    .delete-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-top: 4px solid #c8432a;
      padding: 2.5rem;
      margin-top: 1rem;
      animation: fadeUp 0.4s ease both;
    }
    .delete-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .delete-card p { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }

    /* ── ABOUT ── */
    .about-header {
      border-bottom: 3px solid var(--ink);
      padding-bottom: 1rem;
      margin-bottom: 2.5rem;
    }
    .about-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 900;
      line-height: 1.1;
    }
    .about-header h1 em { color: var(--accent); font-style: italic; }
    .about-body { font-size: 1rem; line-height: 1.9; color: #2a2724; }
    .about-body h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin: 2rem 0 0.6rem;
    }
    .about-body ul { padding-left: 1.2rem; margin: 0.5rem 0 1rem; }
    .about-body ul li { margin-bottom: 0.4rem; }

    /* ── DIVIDER ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── USER POST LIST HEADER ── */
    .author-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--ink);
    }
    .author-header .label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .author-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink);
      color: rgba(255,255,255,0.35);
      text-align: center;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      padding: 1.2rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- NAVBAR -->
  <nav class="site-nav">
    <a class="nav-brand" href="{% url 'home' %}">Home<span>.</span></a>

    <div class="nav-search">
      <form action="{% url 'search' %}" method="GET">
        <input type="text" name="q" placeholder="Search posts…" aria-label="Search"/>
        <button type="submit">Go</button>
      </form>
    </div>

    {% if user.is_authenticated %}
    <div class="nav-links">
      <a class="btn-new" href="{% url 'post-create' %}">+ New Post</a>
      <a href="{% url 'profile' %}">Profile</a>
      <a href="{% url 'logout' %}">Log out</a>
    </div>
    {% else %}
    <div class="nav-join">
      <a href="{% url 'register' %}">Join today</a>
    </div>
    {% endif %}
  </nav>

  <!-- CONTENT -->
  <div class="page-wrapper">
    {% block content %}{% endblock %}
  </div>

  <footer>
    &copy; Feed &mdash; <a href="{% url 'about' %}">About</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
